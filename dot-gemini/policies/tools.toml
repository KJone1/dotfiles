[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "git checkout master",
  "git pull",
  "git diff",
  "git status",
  "git rev-list",
  "git log",
  "just",
  "find",
  "gemini",
  "ls",
  "pwd",
  "cat",
  "grep",
  "rg",
  "mkdir -p",
  "kubectl explain",
  "kubectl get",
  "kubectl logs",
  "kubectl describe",
  "helm template",
  "helm lint",
  "helm show values",
  "gh pr view",
  "gh pr list",
  "gh pr diff",
  "gh pr checks",
  "gh run view",
  "gh repo view",
  "gh issue view",
  "fastmcp "
]
decision = "allow"
priority = 500

[[rule]]
mcpName = "grafana-prod"
toolName = "*"
decision = "allow"
priority = 500

[[rule]]
toolName = [
  "read_file",
  "glob",
  "grep_search",
  "web_fetch",
  "google_web_search",
  "activate_skill"
]
decision = "allow"
priority = 400

[[rule]]
toolName = [
  "write_file",
  "replace"
]
argsPattern = ".*CLAUDE\\.md"
decision = "allow"
priority = 600

[[rule]]
toolName = "read_file"
argsPattern = ".*\\.env.*"
decision = "deny"
denyMessage = "Access to .env files is restricted for security."
priority = 900

[[rule]]
toolName = "read_file"
argsPattern = ".*/secrets/.*"
decision = "deny"
denyMessage = "Access to secrets directory is restricted."
priority = 900

[[rule]]
toolName = "read_file"
argsPattern = ".*/config/credentials\\.json"
decision = "deny"
denyMessage = "Access to credentials.json is restricted."
priority = 900

[[rule]]
toolName = "read_file"
argsPattern = ".*/build/.*"
decision = "deny"
denyMessage = "Access to build artifacts is restricted."
priority = 900
